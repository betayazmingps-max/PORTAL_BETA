# ════════════════════════════════════════════════════════════════
#  Portal Beta — Cloudflare Worker
#  Deploy: npx wrangler deploy
# ════════════════════════════════════════════════════════════════

name       = "portalbeta"
main       = "worker.js"
account_id = ""          # ← pega tu Account ID de Cloudflare Dashboard
compatibility_date = "2024-01-01"

# ── KV Namespace para OTPs (crear con: npx wrangler kv namespace create OTP_STORE)
[[kv_namespaces]]
binding  = "OTP_STORE"
id       = ""            # ← pega el ID del namespace que te da Cloudflare

# ── Variables de entorno (NO pongas secretos aquí, usa: npx wrangler secret put NOMBRE)
# Las siguientes se configuran como SECRETS en Cloudflare:
#
#   npx wrangler secret put ANTHROPIC_API_KEY    → sk-ant-...
#   npx wrangler secret put RESEND_API_KEY       → re_...
#   npx wrangler secret put EMAIL_FROM           → Portal Beta <noreply@tudominio.com>
#   npx wrangler secret put GSHEET_URL           → https://script.google.com/macros/s/...
#   npx wrangler secret put FLOW_SUBIR_DOCS      → https://...powerautomate.com/...
#   npx wrangler secret put FLOW_CREAR_CARPETAS  → https://...powerautomate.com/...
#   npx wrangler secret put APIS_NET_PE_TOKEN    → tu token de apis.net.pe
#   npx wrangler secret put ANALISTAS_JSON       → {"NORTE":{"pass":"beta2026","nombre":"NORTE"},"ADMIN":{"pass":"admin2026","nombre":"Administrador"}}
